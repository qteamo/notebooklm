name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform(s)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - macos
          - windows
          - android

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── macOS ──────────────────────────────────────────────────────────
  build-macos:
    name: macOS (Apple Silicon)
    runs-on: macos-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'macos')
      || github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri desktop app
        run: npm run tauri:build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: NotebookLM-macOS
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload .app (zip)
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -r NotebookLM.app.zip NotebookLM.app
        if: always()
      - uses: actions/upload-artifact@v4
        with:
          name: NotebookLM-macOS-App
          path: src-tauri/target/release/bundle/macos/NotebookLM.app.zip
          if-no-files-found: warn

  # ─── Windows ────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'windows')
      || github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install npm deps
        run: npm ci

      - name: Install system deps (WiX Toolset)
        run: dotnet tool install --global wix

      - name: Build Tauri desktop app
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: NotebookLM-Windows
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS installer (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: NotebookLM-Windows-NSIS
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  # ─── Android ────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'android')
      || github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          accept-android-sdk-licenses: true

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android NDK
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" 2>&1 || true

      - name: Install npm deps
        run: npm ci

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore ${{ github.workspace }}/../debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Generate Android project (if needed)
        run: npx tauri android init 2>&1 || echo "Already initialized"

      - name: Build Android APK
        run: npx tauri android build --target aarch64
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NotebookLM-Android
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: NotebookLM-Android-AAB
          path: src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab

  # ─── Release (triggered by tag push v*) ────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            NotebookLM-macOS/**
            NotebookLM-macOS-App/**
            NotebookLM-Windows/**
            NotebookLM-Windows-NSIS/**
            NotebookLM-Android/**
            NotebookLM-Android-AAB/**
          generate_release_notes: true
